<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forca Poética</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <div class="wrap">
    <header>
      <h1>Forca <span>Poética</span></h1>
      <span class="counter" id="round-label">rodada 1</span>
    </header>

    <div class="main-grid">

      <!-- Forca -->
      <div class="gallows-col">
        <svg id="gallows" viewBox="0 0 160 190" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Estrutura -->
          <line x1="10"  y1="180" x2="150" y2="180" stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="40"  y1="180" x2="40"  y2="10"  stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="40"  y1="10"  x2="100" y2="10"  stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="100" y1="10"  x2="100" y2="32"  stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round"/>
         <!-- Partes do corpo (mostradas em erros) -->
          <circle id="h-head" cx="100" cy="44" r="12"           stroke="#c9a84c" stroke-width="1.5" visibility="hidden"/>
          <line   id="h-body" x1="100" y1="56"  x2="100" y2="96"  stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" visibility="hidden"/>
          <line   id="h-larm" x1="100" y1="68"  x2="78"  y2="84"  stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" visibility="hidden"/>
          <line   id="h-rarm" x1="100" y1="68"  x2="122" y2="84"  stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" visibility="hidden"/>
          <line   id="h-lleg" x1="100" y1="96"  x2="82"  y2="120" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" visibility="hidden"/>
          <line   id="h-rleg" x1="100" y1="96"  x2="118" y2="120" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" visibility="hidden"/>
        </svg>

        <div class="errors-row">
          <span class="errors-label">erros</span>
          <div class="error-dots" id="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>

<!-- Coluna de poemas -->
      <div class="poem-col">

        <div class="info-card">
          <span class="info-tag">Autor</span>
          <div class="info-value" id="info-author">—</div>
        </div>

        <div class="info-card">
          <span class="info-tag">Outros poemas deste autor</span>
          <div class="info-value small" id="info-hint">—</div>
        </div>

        <div class="word-section">
          <span class="word-tag">Título do poema</span>
          <div class="word-row" id="word-row"></div>
        </div>

        <div class="status-bar" id="status-bar"></div>

        <hr class="divider">

        <div class="keyboard" id="keyboard"></div>

        <div class="controls">
          <button class="btn primary" onclick="newGame()">↻ Novo poema</button>
          <button class="btn" onclick="revealHint()">Ver verso</button>
        </div>

        <div class="poem-full" id="poem-full"></div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
